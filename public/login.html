<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Entrar - SegAut-App</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SegAut-App">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <img src="/assets/icons/icon-192.png" class="logo" alt="SegAut-App">
            <h1>SegAut-App</h1>
            <p>Checklist e controle da frota</p>
        </div>

        <div id="errorMessage" class="form-error"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn btn-primary" id="btnLogin">Entrar</button>
        </form>

        <div class="auth-links">
            <a href="#" id="forgotLink">Esqueceu a senha?</a>
            <span class="muted">Não tem uma conta? <a href="/register.html">Criar conta</a></span>
        </div>
    </div>

    <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
