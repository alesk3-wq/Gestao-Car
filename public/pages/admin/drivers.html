<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Condutores - SegAut-App</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SegAut-App">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/admin.css">
</head>
<body>
    <header class="app-header">
        <h1>Condutores</h1>
        <button class="header-action" id="btnLogout" aria-label="Sair">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
    </header>

    <main class="page" style="padding-bottom: 32px">
        <nav class="admin-nav">
            <a href="/pages/admin/history.html">Histórico</a>
            <a href="/pages/admin/vehicles.html">Veículos</a>
            <a href="/pages/admin/drivers.html" class="active">Condutores</a>
        </nav>

        <p class="form-hint" style="margin-bottom:16px">
            Condutores se cadastram pelo app (Criar conta). Aqui você atribui veículo, muda papel e ativa/desativa.
        </p>

        <div class="spinner" id="loading"></div>
        <div id="driversList"></div>
    </main>

    <!-- Bottom-sheet: editar condutor -->
    <div class="sheet-backdrop" id="driverBackdrop"></div>
    <div class="sheet" id="driverSheet">
        <div class="sheet-handle"></div>
        <h2 id="driverSheetTitle">Editar condutor</h2>

        <div class="form-group">
            <label>Nome / matrícula</label>
            <input type="text" id="drvInfo" readonly>
        </div>

        <div class="form-group">
            <label for="drvVehicle">Veículo padrão</label>
            <select id="drvVehicle"></select>
        </div>

        <div class="form-group">
            <label for="drvRole">Papel</label>
            <select id="drvRole">
                <option value="driver">Condutor</option>
                <option value="admin">Gestor (admin)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="drvActive">Situação</label>
            <select id="drvActive">
                <option value="true">Ativo</option>
                <option value="false">Inativo</option>
            </select>
        </div>

        <button class="btn btn-primary" id="btnSaveDriver">Salvar</button>
        <button class="btn btn-secondary" id="btnCancelDriver" style="margin-top:8px">Cancelar</button>
    </div>

    <script type="module" src="/js/pages/admin/drivers.js"></script>
</body>
</html>
