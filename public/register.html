<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Criar conta - Frota App</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Frota App">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/assets/icons/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <img src="/assets/icons/icon-192.png" class="logo" alt="Frota App">
            <h1>Criar conta</h1>
            <p>Cadastro de condutor</p>
        </div>

        <div id="errorMessage" class="form-error"></div>

        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="name">Nome completo</label>
                <input type="text" id="name" placeholder="João Silva" autocomplete="name" required>
            </div>

            <div class="form-group">
                <label for="matricula">Matrícula</label>
                <input type="text" id="matricula" placeholder="Ex: 00123" autocomplete="off" required>
                <p class="form-hint">Identificador interno da empresa</p>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
            </div>

            <button type="submit" class="btn btn-primary" id="btnRegister">Criar conta</button>
        </form>

        <div class="auth-links">
            <span class="muted">Já tem conta? <a href="/login.html">Entrar</a></span>
        </div>
    </div>

    <script type="module" src="/js/pages/register.js"></script>
</body>
</html>
